name: Ping Streamlit App

on:
  schedule:
    - cron: "*/10 * * * *" # Se ejecuta cada 10 minutos automáticamente
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub si quieres

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hacer ping al dashboard principal
        # IMPORTANTE: Reemplaza la URL de abajo por el link real de tu dashboard
        run: curl -sL "https://infocamiones.streamlit.app/" > /dev/null
        
      - name: Hacer ping al segundo dashboard (informe_levantes_camiones)
        # IMPORTANTE: Reemplaza la URL de abajo por el link real de tu SEGUNDO dashboard
        run: curl -sL "REEMPLAZA_ESTO_POR_TU_LINK_DEL_SEGUNDO_DASHBOARD" > /dev/null
